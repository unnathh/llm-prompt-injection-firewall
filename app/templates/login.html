<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LLM Prompt Injection Firewall</title>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Dark Mode CSS -->
    <link href="/static/css/styles.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
        }
    </style>
</head>
<body>

    <div class="login-card p-3">
        <div class="text-center mb-4">
            <span style="background-color: var(--primary-color); width: 36px; height: 36px; border-radius: 50%; display: inline-block; box-shadow: 0 0 15px var(--primary-color); margin-bottom: 12px;"></span>
            <h3 class="text-light">LLM Security Gateway</h3>
            <p class="text-secondary" style="font-size: 0.85rem;">Authenticate to access threat metrics and configurations.</p>
        </div>

        {% if request.query_params.get('error') == 'invalid_credentials' %}
        <div class="alert alert-danger border-0 text-white bg-danger p-3 mb-3 rounded-3" role="alert" style="font-size: 0.85rem;">
            <strong>Error:</strong> Invalid administrator username or password.
        </div>
        {% endif %}

        <div class="card-custom">
            <form action="/api/dashboard/login" method="POST">
                
                <div class="mb-3">
                    <label for="username" class="form-label text-light" style="font-size: 0.85rem;">Username</label>
                    <input type="text" class="form-control form-control-custom py-2" id="username" name="username" required placeholder="admin">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-light" style="font-size: 0.85rem;">Password</label>
                    <input type="password" class="form-control form-control-custom py-2" id="password" name="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn glow-btn w-100 py-2 mt-2">Log In</button>
                
            </form>
        </div>
        
        <div class="text-center mt-3 text-secondary" style="font-size: 0.8rem;">
            Default credentials: <code>admin</code> / <code>admin123</code>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
