<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LLM Prompt Injection Firewall{% endblock %}</title>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Dark Mode CSS -->
    <link href="/static/css/styles.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block head %}{% endblock %}
</head>
<body>

    <!-- Top Navigation Header -->
    <nav class="navbar navbar-dark navbar-custom px-4 py-3">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 d-flex align-items-center gap-2">
                <span style="background-color: var(--primary-color); width: 12px; height: 12px; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--primary-color);"></span>
                LLM Security Firewall
            </span>
            <div class="d-flex align-items-center gap-3">
                <a href="/dashboard" class="btn btn-sm btn-outline-light {% if request.url.path == '/dashboard' %}active{% endif %}">Dashboard</a>
                <a href="/dashboard/test" class="btn btn-sm btn-outline-light {% if request.url.path == '/dashboard/test' %}active{% endif %}">Prompt Testing</a>
                <a href="/dashboard/settings" class="btn btn-sm btn-outline-light {% if request.url.path == '/dashboard/settings' %}active{% endif %}">Settings</a>
                <a href="/dashboard/logout" class="btn btn-sm btn-outline-danger">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Workspace Container -->
    <div class="container-fluid py-4 px-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
