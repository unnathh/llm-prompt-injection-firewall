version: '3.8'

services:
  firewall-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: firewall-api
    ports:
      - "8000:8000"
    volumes:
      - ./firewall.db:/app/firewall.db
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:////app/firewall.db
      - ENV=production
      - DEBUG=false
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: firewall-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - firewall-api
    restart: unless-stopped
